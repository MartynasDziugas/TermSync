{% extends "base.html" %}

{% block title %}TermSync — Eksportas{% endblock %}

{% block content %}
<h1>Eksportas</h1>

<form action="/export/tmx" method="POST">
    <h2>Eksportuoti į TMX</h2>
    <select name="old_version" required>
        <option value="">Sena versija</option>
        {% for version in versions %}
        <option value="{{ version.id }}">{{ version.version_number }}</option>
        {% endfor %}
    </select>
    <select name="new_version" required>
        <option value="">Nauja versija</option>
        {% for version in versions %}
        <option value="{{ version.id }}">{{ version.version_number }}</option>
        {% endfor %}
    </select>
    <button type="submit">Eksportuoti TMX</button>
</form>

<form action="/export/docx" method="POST">
    <h2>Eksportuoti į DOCX</h2>
    <select name="old_version" required>
        <option value="">Sena versija</option>
        {% for version in versions %}
        <option value="{{ version.id }}">{{ version.version_number }}</option>
        {% endfor %}
    </select>
    <select name="new_version" required>
        <option value="">Nauja versija</option>
        {% for version in versions %}
        <option value="{{ version.id }}">{{ version.version_number }}</option>
        {% endfor %}
    </select>
    <button type="submit">Eksportuoti DOCX</button>
</form>
{% endblock %}
