{% extends "base.html" %}

{% block title %}TermSync — Eksportas{% endblock %}

{% block content %}
<h1>Eksportas</h1>

<form action="/export/tmx" method="POST">
    <h2>Eksportuoti į TMX</h2>
    <label>Senas QRD šablonas:</label>
    <select name="old_template_id" required>
        <option value="">Pasirinkti</option>
        {% for template in templates %}
        <option value="{{ template.id }}">{{ template.name }}</option>
        {% endfor %}
    </select>
    <label>Naujas QRD šablonas:</label>
    <select name="new_template_id" required>
        <option value="">Pasirinkti</option>
        {% for template in templates %}
        <option value="{{ template.id }}">{{ template.name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Eksportuoti TMX</button>
</form>

<form action="/export/docx" method="POST">
    <h2>Eksportuoti į DOCX</h2>
    <label>Senas QRD šablonas:</label>
    <select name="old_template_id" required>
        <option value="">Pasirinkti</option>
        {% for template in templates %}
        <option value="{{ template.id }}">{{ template.name }}</option>
        {% endfor %}
    </select>
    <label>Naujas QRD šablonas:</label>
    <select name="new_template_id" required>
        <option value="">Pasirinkti</option>
        {% for template in templates %}
        <option value="{{ template.id }}">{{ template.name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Eksportuoti DOCX</button>
</form>
{% endblock %}
