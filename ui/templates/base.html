<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TermSync{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="global-loading-side" aria-hidden="true">
        <div class="global-loading-side-track">
            <div class="global-loading-side-fill"></div>
        </div>
    </div>
    <nav>
        <a href="{{ url_for('ui.index') }}">Pradžia</a>
        <a href="{{ url_for('ui.train') }}">Standarto mokymas</a>
        <a href="{{ url_for('ui.check') }}">Doc Upload</a>
        <a href="{{ url_for('ui.history') }}">Istorija</a>
        <a href="{{ url_for('ui.glossary') }}">CSV glossorius</a>
    </nav>
    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-list" role="status">
            {% for category, message in messages %}
            <p class="flash flash-{{ category }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
</body>
</html>
